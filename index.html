<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoHoZ Global Reels</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family: sans-serif; }
        .feed { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
        .feed::-webkit-scrollbar { display:none; }
        .reel { height:100vh; width:100vw; scroll-snap-align:start; position:relative; background:#000; display:flex; align-items:center; }
        video { width:100%; height:100%; object-fit:cover; }
        .ui { position:absolute; bottom:50px; left:20px; color:#fff; z-index:10; text-shadow:0 0 10px #000; }
        .ui h4 { color: #00ffff; margin-bottom: 5px; font-size: 18px; }
        .side-bar { position:absolute; right:15px; bottom:120px; display:flex; flex-direction:column; gap:20px; }
        .icon { width:45px; height:45px; background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); border-radius:50%; border:1px solid rgba(0,255,255,0.3); display:flex; align-items:center; justify-content:center; color:#fff; font-size: 20px; }
    </style>
</head>
<body>
<div class="feed" id="feed"></div>
<script>
    const feed = document.getElementById('feed');
    // Pixabay API - এটি অটোমেটিক ভিডিও নিয়ে আসবে
    async function loadVideos() {
        try {
            const res = await fetch('https://pixabay.com/api/videos/?key=43004464-968e7b9e7352345638c035678&q=nature&per_page=10');
            const data = await res.json();
            data.hits.forEach(v => {
                const card = document.createElement('div');
                card.className = 'reel';
                card.innerHTML = `
                    <video src="${v.videos.medium.url}" loop playsinline></video>
                    <div class="side-bar">
                        <div class="icon">❤️</div>
                        <div class="icon">⭐</div>
                        <div class="icon">↗️</div>
                    </div>
                    <div class="ui"><h4>@SoHoZ_User</h4><p>Trending Reel from Global Sources</p></div>`;
                feed.appendChild(card);
                observer.observe(card);
            });
        } catch(e) { console.log("Error loading videos"); }
    }

    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
            const v = e.target.querySelector('video');
            if(e.isIntersecting) {
                v.play().catch(()=>{});
                // যদি শেষ ভিডিওতে আসে তবে নতুন ভিডিও লোড করবে
                if (e.target === feed.lastElementChild) loadVideos();
            } else {
                v.pause();
            }
        });
    }, {threshold:0.7});

    loadVideos();
</script>
</body>
</html>
