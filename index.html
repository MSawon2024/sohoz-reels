<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoHoZ Reels</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; }
        
        /* মেইন কন্টেইনার যা ভিডিওগুলোকে আলাদা রাখবে */
        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* এক টানে একটি ভিডিও */
            scrollbar-width: none;
        }
        .reels-container::-webkit-scrollbar { display: none; }

        .reel-unit {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ভিডিও পুরো স্ক্রিন জুড়ে থাকবে */
        }

        /* টেক্সট ডিজাইন */
        .video-info {
            position: absolute;
            bottom: 60px;
            left: 20px;
            color: white;
            z-index: 10;
            font-family: sans-serif;
            pointer-events: none;
        }
        .video-info h3 { color: #00ffff; margin-bottom: 5px; text-shadow: 2px 2px 5px #000; }
        .video-info p { font-size: 14px; text-shadow: 1px 1px 3px #000; }
    </style>
</head>
<body>

<div class="reels-container" id="reels">
    </div>

<script>
    const container = document.getElementById('reels');
    
    // ভিডিওর সোর্স লিস্ট
    const videos = [
        "https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-12859-large.mp4",
        "https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-1173-large.mp4",
        "https://assets.mixkit.co/videos/preview/mixkit-slow-motion-video-of-a-woman-in-the-city-at-night-34505-large.mp4",
        "https://assets.mixkit.co/videos/preview/mixkit-vertical-shot-of-a-keyboard-and-mouse-with-neon-lights-42589-large.mp4"
    ];

    function createReels() {
        videos.forEach((src, index) => {
            const section = document.createElement('div');
            section.className = 'reel-unit';
            section.innerHTML = `
                <video src="${src}" loop playsinline muted></video>
                <div class="video-info">
                    <h3>@SoHoZ_User</h3>
                    <p>Global Trending Video #${index + 1}</p>
                </div>
            `;
            container.appendChild(section);
            observer.observe(section);
        });
    }

    // অটো-প্লে লজিক
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const vid = entry.target.querySelector('video');
            if (entry.isIntersecting) {
                vid.play();
            } else {
                vid.pause();
                vid.currentTime = 0; // পরের বার শুরুতে ফিরে যাবে
            }
        });
    }, { threshold: 0.8 });

    createReels();
</script>
</body>
</html>
