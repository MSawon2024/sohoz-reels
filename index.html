<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoHoZ Reels</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family: sans-serif; }
        .feed { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
        .feed::-webkit-scrollbar { display:none; }
        .reel { height:100vh; width:100vw; scroll-snap-align:start; position:relative; display:flex; align-items:center; justify-content:center; background:#000; }
        video { width:100%; height:100%; object-fit:cover; }
        .ui { position:absolute; bottom:60px; left:20px; color:#fff; z-index:10; }
        .ui h4 { color: #00ffff; margin-bottom: 5px; font-size: 18px; text-shadow: 0 0 10px #000; }
        .ui p { font-size: 14px; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>
<div class="feed" id="feed"></div>

<script>
    const feed = document.getElementById('feed');
    
    // এই লিঙ্কগুলো সরাসরি কাজ করবে (Sample Videos)
    const videos = [
        "https://v.ftn.icu/nature_1.mp4",
        "https://v.ftn.icu/city_1.mp4",
        "https://v.ftn.icu/abstract_1.mp4"
    ];

    function createReel(src) {
        const card = document.createElement('div');
        card.className = 'reel';
        card.innerHTML = `
            <video src="${src}" loop playsinline muted autoplay></video>
            <div class="ui">
                <h4>@SoHoZ_User</h4>
                <p>Welcome to SoHoZ Global Feed ✨</p>
            </div>`;
        feed.appendChild(card);
        observer.observe(card);
    }

    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
            const v = e.target.querySelector('video');
            if(e.isIntersecting) {
                v.play().catch(() => {});
            } else {
                v.pause();
            }
        });
    }, {threshold: 0.6});

    // ভিডিওগুলো লোড করা
    videos.forEach(src => createReel(src));
</script>
</body>
</html>
